name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          test -n "${SSH_PRIVATE_KEY:-}"
          printf '%s\n' "${SSH_PRIVATE_KEY:-}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          grep -Eq "BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY" ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: Ensure deploy directory exists on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT:-22}" \
            "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync project files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${SSH_PORT:-22}" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Build and restart Docker services on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_FILE: ${{ secrets.COMPOSE_FILE }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' COMPOSE_FILE='${COMPOSE_FILE:-docker-compose.yml}' ENV_FILE_CONTENT='$ENV_FILE_CONTENT' COMPOSE_PROJECT_NAME='${COMPOSE_PROJECT_NAME:-ansibleflow}' bash -s" <<'REMOTE'
            set -e

            cd "$DEPLOY_PATH"
            if [ -n "${ENV_FILE_CONTENT:-}" ]; then
              printf '%s\n' "$ENV_FILE_CONTENT" > .env
              chmod 600 .env
            fi
            test -f .env
            if ! docker compose -p "${COMPOSE_PROJECT_NAME}" -f "${COMPOSE_FILE:-docker-compose.yml}" up -d --build --remove-orphans; then
              docker compose -p "${COMPOSE_PROJECT_NAME}" -f "${COMPOSE_FILE:-docker-compose.yml}" ps || true
              docker compose -p "${COMPOSE_PROJECT_NAME}" -f "${COMPOSE_FILE:-docker-compose.yml}" logs --tail=200 || true
              exit 1
            fi
            docker compose -p "${COMPOSE_PROJECT_NAME}" -f "${COMPOSE_FILE:-docker-compose.yml}" ps
          REMOTE
