services:
  # ════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ansibleflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ansibleflow}
      POSTGRES_DB: ${POSTGRES_DB:-ansibleflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ansibleflow} -d ${POSTGRES_DB:-ansibleflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════════════════════
  # BACKEND  —  Python FastAPI
  # ════════════════════════════════════════════════════════════════════════════

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ansibleflow-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ansibleflow}:${POSTGRES_PASSWORD:-ansibleflow}@db:5432/${POSTGRES_DB:-ansibleflow}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANSIBLE_BASE_PATH: /app/ansible
    volumes:
      - ./ansible:/app/ansible:ro # playbooks/rôles en lecture seule
      - backups_data:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  # ════════════════════════════════════════════════════════════════════════════
  # WORKER  —  Celery + Ansible Runner
  # ════════════════════════════════════════════════════════════════════════════

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ansibleflow-backend
    restart: unless-stopped
    command: >
      celery -A tasks.celery_app worker
             --loglevel=info
             --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ansibleflow}:${POSTGRES_PASSWORD:-ansibleflow}@db:5432/${POSTGRES_DB:-ansibleflow}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANSIBLE_BASE_PATH: /app/ansible
    volumes:
      - ./ansible:/app/ansible # lecture+écriture (génère les host_vars dynamiques)
      - backups_data:/backups
      - ~/.ssh:/root/.ssh:ro # clés SSH de la machine hôte pour Ansible
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # FRONTEND  —  React (build Vite) servi par Nginx interne
  # ════════════════════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ansibleflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # NGINX  —  Point d'entrée unique (port 80)
  #
  #   /api/  →  backend:8000   (API REST)
  #   /ws/   →  backend:8000   (WebSocket — logs temps réel)
  #   /docs  →  backend:8000   (Swagger)
  #   /      →  frontend:80    (React SPA)
  # ════════════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "82:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

# ════════════════════════════════════════════════════════════════════════════
# VOLUMES persistants
# ════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
  redis_data:
  backups_data:
