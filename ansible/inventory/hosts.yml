---
# Inventaire principal AnsibleFlow
# Les hôtes sont générés dynamiquement depuis la base de données
# via backend/api/routes/projects.py (_generate_ansible_structure)
# Ce fichier sert de base statique / fallback.

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=30"

  children:

    production:
      vars:
        project_environment: production
      hosts: {}

    staging:
      vars:
        project_environment: staging
      hosts: {}

    development:
      vars:
        project_environment: development
      hosts: {}
