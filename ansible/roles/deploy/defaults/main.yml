---
project_name: ""
project_domain: ""
target_environment: production

# Répertoire d'installation sur le serveur cible
app_base_dir: /var/www

# Utilisateur propriétaire des fichiers applicatifs
app_user: www-data
app_group: www-data

# Composants à déployer (liste passée depuis l'API)
# Valeurs possibles : application, database, nginx, systemd
components:
  - application
  - nginx

# Stratégie de déploiement :
#   - git_app        : déploiement applicatif classique (release/current)
#   - docker_compose : app existante avec Dockerfile/docker-compose dans le repo
#   - wordpress      : stack WordPress + MariaDB générée automatiquement
deploy_strategy: git_app

# ── Source du déploiement ─────────────────────────────────────────────────────
# Méthode : git | archive
deploy_method: git

# Git
git_repo: ""
git_branch: main
git_depth: 1

# Archive (si deploy_method == archive)
deploy_archive_url: ""
deploy_archive_checksum: ""

# ── Base de données ────────────────────────────────────────────────────────────
db_type: none
db_name: ""
db_user: ""
db_password: ""
db_host: localhost

# ── Web server ────────────────────────────────────────────────────────────────
webserver: nginx
webserver_config_dir_nginx: /etc/nginx/sites-available
webserver_enabled_dir_nginx: /etc/nginx/sites-enabled
http_port: 80
https_port: 443

# ── Application (PHP/Node/Python) ─────────────────────────────────────────────
app_port: 3000
php_fpm_service: php8.2-fpm
node_version: "20"

# ── Docker / Compose ───────────────────────────────────────────────────────────
docker_compose_file: docker-compose.yml
docker_compose_project_name: "{{ project_name }}"

# ── WordPress (mode deploy_strategy=wordpress) ────────────────────────────────
wordpress_app_image: wordpress:6.5-apache
wordpress_db_image: mariadb:11.4
wordpress_app_port: 8080
wordpress_db_name: wordpress
wordpress_db_user: wordpress
wordpress_db_password: wordpress
wordpress_db_root_password: rootchange

# ── Systemd service (optionnel) ────────────────────────────────────────────────
systemd_service_name: "{{ project_name }}"
systemd_service_enabled: true

# ── Rollback ─────────────────────────────────────────────────────────────────
# Chemin de l'archive de rollback (généré automatiquement avant déploiement)
rollback_archive: "{{ app_base_dir }}/{{ project_name }}_rollback.tar.gz"
