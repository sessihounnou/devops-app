---
- name: Vérifier les variables obligatoires
  ansible.builtin.assert:
    that:
      - project_name is defined and project_name | length > 0
      - target_host is defined and target_host | length > 0
      - deploy_strategy in ['git_app', 'docker_compose', 'wordpress']
    fail_msg: "project_name, target_host et une deploy_strategy valide sont obligatoires"

# ── Snapshot de rollback avant toute modification ─────────────────────────────
- name: Vérifier si un déploiement précédent existe
  ansible.builtin.stat:
    path: "{{ app_base_dir }}/{{ project_name }}/current"
  register: previous_deploy

- name: Créer un snapshot de rollback de l'état actuel
  ansible.builtin.archive:
    path: "{{ app_base_dir }}/{{ project_name }}"
    dest: "{{ rollback_archive }}"
    format: gz
    mode: "0600"
  when: previous_deploy.stat.exists

# ── Préparer la structure de répertoires ─────────────────────────────────────
- name: Créer l'arborescence de déploiement (releases / shared / current)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ app_base_dir }}/{{ project_name }}"
    - "{{ app_base_dir }}/{{ project_name }}/releases"
    - "{{ app_base_dir }}/{{ project_name }}/shared"
    - "{{ app_base_dir }}/{{ project_name }}/shared/logs"
    - "{{ app_base_dir }}/{{ project_name }}/shared/storage"

- name: Définir le répertoire de la release courante
  ansible.builtin.set_fact:
    release_dir: "{{ app_base_dir }}/{{ project_name }}/releases/{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"

- name: Créer le répertoire de la nouvelle release
  ansible.builtin.file:
    path: "{{ release_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  when: deploy_strategy in ['git_app', 'docker_compose']

# ── Vérifications source Git si nécessaire ───────────────────────────────────
- name: Vérifier que git_repo est défini pour un déploiement basé Git
  ansible.builtin.fail:
    msg: >-
      Le champ Repository Git est obligatoire pour deploy_strategy={{ deploy_strategy }}.
      Ajoutez repo_url dans le projet avant de relancer le déploiement.
  when:
    - deploy_strategy in ['git_app', 'docker_compose']
    - git_repo is not defined or git_repo | length == 0

# ── Récupérer les sources ─────────────────────────────────────────────────────
- name: Cloner le dépôt Git
  ansible.builtin.git:
    repo: "{{ git_repo }}"
    dest: "{{ release_dir }}"
    version: "{{ git_branch }}"
    depth: "{{ git_depth }}"
    force: true
  when: deploy_strategy in ['git_app', 'docker_compose'] and deploy_method == 'git' and git_repo | length > 0
  become_user: "{{ app_user }}"

- name: Télécharger et extraire l'archive de déploiement
  ansible.builtin.unarchive:
    src: "{{ deploy_archive_url }}"
    dest: "{{ release_dir }}"
    remote_src: true
  when: deploy_strategy in ['git_app', 'docker_compose'] and deploy_method == 'archive' and deploy_archive_url | length > 0

- name: Écrire le fichier .env pour la release
  ansible.builtin.copy:
    content: "{{ env_file_content }}"
    dest: "{{ release_dir }}/.env"
    mode: "0600"
  when:
    - deploy_strategy in ['git_app', 'docker_compose']
    - env_file_content is defined
    - env_file_content != ""
  no_log: true

# ── Flux 1: application Git classique ────────────────────────────────────────
- name: Déployer une application Git classique
  when: deploy_strategy == 'git_app'
  block:
    - name: Créer les liens symboliques vers shared/
      ansible.builtin.file:
        src: "{{ app_base_dir }}/{{ project_name }}/shared/{{ item }}"
        dest: "{{ release_dir }}/{{ item }}"
        state: link
        force: true
      loop:
        - logs
        - storage

    - name: Installer les dépendances PHP (Composer)
      ansible.builtin.command:
        cmd: composer install --no-dev --optimize-autoloader
        chdir: "{{ release_dir }}"
      when: "'php' in components"
      become_user: "{{ app_user }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Installer les dépendances Node.js
      ansible.builtin.command:
        cmd: npm ci --production
        chdir: "{{ release_dir }}"
      when: "'nodejs' in components"
      become_user: "{{ app_user }}"

    - name: Installer les dépendances Python
      ansible.builtin.pip:
        requirements: "{{ release_dir }}/requirements.txt"
        virtualenv: "{{ release_dir }}/.venv"
        virtualenv_command: python3 -m venv
      when: "'python' in components"

    - name: Faire pointer current vers la nouvelle release
      ansible.builtin.file:
        src: "{{ release_dir }}"
        dest: "{{ app_base_dir }}/{{ project_name }}/current"
        state: link
        force: true

# ── Flux 2: application Docker/Compose existante ─────────────────────────────
- name: Déployer une application Docker/Compose
  when: deploy_strategy == 'docker_compose'
  block:
    - name: Vérifier la présence de Docker
      ansible.builtin.command:
        cmd: docker --version
      register: docker_check
      changed_when: false

    - name: Vérifier la présence de Docker Compose
      ansible.builtin.command:
        cmd: docker compose version
      register: docker_compose_check
      changed_when: false

    - name: Démarrer la stack applicative docker-compose
      ansible.builtin.command:
        cmd: docker compose -f {{ docker_compose_file }} up -d --build --remove-orphans
        chdir: "{{ release_dir }}"

    - name: Faire pointer current vers la release Docker
      ansible.builtin.file:
        src: "{{ release_dir }}"
        dest: "{{ app_base_dir }}/{{ project_name }}/current"
        state: link
        force: true

# ── Flux 3: WordPress managé ─────────────────────────────────────────────────
- name: Déployer une stack WordPress
  when: deploy_strategy == 'wordpress'
  block:
    - name: Vérifier la présence de Docker
      ansible.builtin.command:
        cmd: docker --version
      changed_when: false

    - name: Vérifier la présence de Docker Compose
      ansible.builtin.command:
        cmd: docker compose version
      changed_when: false

    - name: Créer le répertoire WordPress
      ansible.builtin.file:
        path: "{{ app_base_dir }}/{{ project_name }}/wordpress"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Générer le docker-compose WordPress
      ansible.builtin.template:
        src: wordpress_compose.yml.j2
        dest: "{{ app_base_dir }}/{{ project_name }}/wordpress/docker-compose.yml"
        mode: "0644"

    - name: Démarrer WordPress via docker-compose
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_base_dir }}/{{ project_name }}/wordpress"

# ── Configuration nginx ───────────────────────────────────────────────────────
- name: Déployer le vhost nginx
  ansible.builtin.template:
    src: nginx_vhost.j2
    dest: "{{ webserver_config_dir_nginx }}/{{ project_name }}"
    mode: "0644"
  when: "'nginx' in components"
  notify: Reload nginx

- name: Activer le vhost nginx (sites-enabled)
  ansible.builtin.file:
    src: "{{ webserver_config_dir_nginx }}/{{ project_name }}"
    dest: "{{ webserver_enabled_dir_nginx }}/{{ project_name }}"
    state: link
    force: true
  when: "'nginx' in components"
  notify: Reload nginx

# ── Redémarrer le service applicatif (mode classique uniquement) ─────────────
- name: Redémarrer le service systemd du projet
  ansible.builtin.service:
    name: "{{ systemd_service_name }}"
    state: restarted
    enabled: "{{ systemd_service_enabled }}"
  when:
    - deploy_strategy == 'git_app'
    - "'systemd' in components"
  ignore_errors: true
  notify: Restart app service

# ── Nettoyer les vieilles releases (garder les 5 dernières) ──────────────────
- name: Lister les releases existantes
  ansible.builtin.find:
    paths: "{{ app_base_dir }}/{{ project_name }}/releases"
    file_type: directory
  register: all_releases

- name: Supprimer les releases obsolètes (> 5)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: >-
    {{
      all_releases.files
      | sort(attribute='mtime')
      | list
      | difference(
          all_releases.files
          | sort(attribute='mtime', reverse=True)
          | list[:5]
        )
    }}
  when: all_releases.files | length > 5

- name: Afficher le résultat du déploiement
  ansible.builtin.debug:
    msg: >-
      Déploiement de {{ project_name }} vers {{ target_host }}
      réussi — stratégie : {{ deploy_strategy }}
