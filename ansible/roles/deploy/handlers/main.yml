---
- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: Restart nginx
  ansible.builtin.service:
    name: nginx
    state: restarted

- name: Restart php-fpm
  ansible.builtin.service:
    name: "{{ php_fpm_service }}"
    state: restarted

- name: Restart app service
  ansible.builtin.service:
    name: "{{ systemd_service_name }}"
    state: restarted
