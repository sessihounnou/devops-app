server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — toutes les routes React sont servies depuis index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactiver les logs pour les assets statiques
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
